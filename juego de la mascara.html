.roto{

}

@keyframes pantallaRota{

20%{transform:scale(1.02) rotate(1deg);}

80%{transform:scale(0.99);}
100%{transform:scale(1);}

}

right:20px;

padding:15px 25px;

animation:apareceLogro 0.5s;

}

@keyframes apareceLogro{
from{transform:translateX(200px);opacity:0;}
to{transform:translateX(0);opacity:1;}

function iniciarJuego(){

let nombreInput=document.getElementById("nombre").value

if(nombreInput.trim()==""){
alert("Escribe tu nombre para comenzar")
return
}

jugador=nombreInput

document.getElementById("registro").style.display="none"

document.getElementById("musicaFondo").play()

nuevaRonda()

}

function nuevaRonda(){

document.getElementById("juego").style.display="block"
document.getElementById("opciones").style.display="none"

let personaje=personajes[Math.floor(Math.random()*personajes.length)]

personajeCorrecto=personaje.nombre
pistasActuales=personaje[dificultad]

let tiempo=10
let indice=0

document.getElementById("pista").innerText=pistasActuales[indice]
tuxPensando()
document.getElementById("tiempo").innerText=tiempo

let barra=document.getElementById("barraTiempo")
barra.style.width="100%"

let contador=setInterval(function(){

tiempo--
barra.style.width=(tiempo*10)+"%"

if(tiempo%2==0 && indice<pistasActuales.length-1){
indice++
document.getElementById("pista").innerText=pistasActuales[indice]
tuxPensando()
}

document.getElementById("tiempo").innerText=tiempo

if(tiempo==0){
clearInterval(contador)
mostrarOpciones()
}

},1000)

}

function mostrarOpciones(){

document.getElementById("juego").style.display="none"
document.getElementById("opciones").style.display="block"

let botones=document.querySelectorAll("#opciones button")

let opciones=[personajeCorrecto]

while(opciones.length<4){

let r=personajes[Math.floor(Math.random()*personajes.length)].nombre

if(!opciones.includes(r)) opciones.push(r)

}

opciones.sort(()=>Math.random()-0.5)

for(let i=0;i<4;i++){

botones[i].innerText=opciones[i]

}

}

function responder(boton){
if(preguntaRespondida) return
preguntaRespondida=true

if(boton.innerText==personajeCorrecto){

combo++

let multiplicador=1

if(combo>=5){
multiplicador=5
}else if(combo>=3){
multiplicador=3
}else if(combo>=2){
multiplicador=2
}

puntos+=10*multiplicador

document.getElementById("resultado").innerText="✅ Correcto"
document.getElementById("correcto").play()
tuxFeliz()

document.getElementById("comboTexto").innerText="🔥 COMBO x"+multiplicador
if(!logros.primerAcierto){
logros.primerAcierto=true
mostrarLogro("🥇 Primer acierto")
}

if(combo>=3 && !logros.combo3){
logros.combo3=true
mostrarLogro("🔥 Combo x3")
}

if(combo>=5 && !logros.combo5){
logros.combo5=true
mostrarLogro("🚀 Combo x5")
}

if(puntos>=100 && !logros.experto){
logros.experto=true
mostrarLogro("🧠 Experto Linux")
}
}else{

combo=0

document.getElementById("resultado").innerText="❌ Era "+personajeCorrecto
document.getElementById("error").play()
tuxTriste()

document.getElementById("comboTexto").innerText=""

}

document.getElementById("puntos").innerText="Puntos: "+puntos

}

function siguienteRonda(){

ronda++

if(ronda>totalRondas){

terminarJuego()
return

}

document.getElementById("ronda").innerText="Ronda "+ronda+" / "+totalRondas
document.getElementById("resultado").innerText=""

nuevaRonda()

}

function terminarJuego(){

document.getElementById("opciones").style.display="none"
document.getElementById("final").style.display="block"

document.getElementById("puntajeFinal").innerText="Puntaje de "+jugador+": "+puntos

guardarPuntaje()

}

function guardarPuntaje(){

let ranking=JSON.parse(localStorage.getItem("rankingLinux")) || []

ranking.push({nombre:jugador,puntos:puntos})

ranking.sort((a,b)=>b.puntos-a.puntos)


localStorage.setItem("rankingLinux",JSON.stringify(ranking))

}

function mostrarLogro(texto){

let box=document.getElementById("logroBox")
let txt=document.getElementById("logroTexto")

txt.innerText=texto

box.style.display="block"

setTimeout(()=>{
box.style.display="none"
},3000)

}

function mostrarRanking(){

document.getElementById("final").style.display="none"
document.getElementById("ranking").style.display="block"

let ranking=JSON.parse(localStorage.getItem("rankingLinux")) || []

let tabla=document.getElementById("tablaRanking")

ranking.forEach(r=>{

let fila=tabla.insertRow()

fila.insertCell(0).innerText=r.nombre
fila.insertCell(1).innerText=r.puntos

})

}

</script>

">

width:80%;
max-width:600px;
">

</div>
